<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explorador de Sonoridades</title>
    <style>
        :root {
            --primary: #2C3E50;
            --accent:  #E74C3C;
            --bg:      #ECF0F1;
            --c-rima:  #27AE60;
            --c-eco:   #2980B9;
            --c-ass:   #E67E22;
            --c-prox:  #8E44AD;
            --c-ritmo: #7F8C8D;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--primary); padding: 0; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Ajuste do container para Mobile */
        .container { 
            width: 100%; max-width: 960px; background: white; 
            padding: 0 20px 30px; border-radius: 0 0 8px 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; 
            min-height: 100vh;
        }

        /* ── Header Sticky (Grudado no topo) ───────── */
        .sticky-header {
            position: sticky; top: 0; background: white; z-index: 100;
            padding: 20px 0 10px; margin: 0 0 16px;
            border-bottom: 1px solid #f0f0f0; box-shadow: 0 2px 4px rgba(255,255,255,0.9);
        }

        /* ── App header ───────── */
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .app-title  { font-size: 16px; font-weight: 600; color: #aaa; letter-spacing: 0.4px; }
        .status-chip { font-size: 12px; color: #7f8c8d; background: #F4F6F6; padding: 6px 12px; border-radius: 20px; white-space: nowrap; }

        /* ── Busca Mobile First ───── */
        .search-wrap { position: relative; margin-bottom: 4px; }
        .search-wrap input {
            display: block; width: 100%; 
            padding: 14px 104px 14px 16px; /* Espaço para 2 botões de 44px */
            font-size: 16px; /* Evita zoom no iOS */
            border: 1px solid #BDC3C7; border-radius: 8px;
            outline: none; transition: border 0.2s; box-sizing: border-box;
            background: #fdfdfd; -webkit-appearance: none;
        }
        .search-wrap input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1); }
        
        /* Botões de Mínimo Esforço (44x44px Lei de Fitts) */
        .action-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            border: none; transition: all 0.18s; padding: 0;
        }
        #btnBuscar { right: 6px; background: var(--primary); color: white; font-size: 20px;}
        #btnBuscar:hover:not(:disabled) { background: var(--accent); }
        #btnBuscar:disabled { background: #BDC3C7; cursor: not-allowed; }
        
        #btnMic { right: 54px; background: transparent; color: #7f8c8d; font-size: 20px;}
        #btnMic:hover { background: #f0f0f0; color: var(--primary); }
        #btnMic.listening { color: var(--accent); background: #fdecea; animation: pulse 1.2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; transform: translateY(-50%) scale(1); } 50% { opacity: 0.7; transform: translateY(-50%) scale(1.1); } 100% { opacity: 1; transform: translateY(-50%) scale(1); } }

        /* ── Perfil inline ──────────── */
        .perfil-linha { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 8px; padding: 10px 14px; margin-bottom: 16px; background: #f8f9fa; border-left: 4px solid var(--accent); border-radius: 0 6px 6px 0; }
        .perfil-pw { font-size: 18px; letter-spacing: 1px; margin-right: 4px; flex-shrink: 0; }
        .tonica-inline { color: var(--accent); font-weight: bold; }
        .ptag { font-size: 12px; color: #666; background: white; border: 1px solid #e2e6ea; border-radius: 4px; padding: 3px 8px; }

        /* ── Faixas (Thumb Zone friendly) ───────── */
        .banda-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .banda-row::-webkit-scrollbar { display: none; }
        .banda-btn { flex-shrink: 0; border: 2px solid var(--bc); background: white; color: var(--bc); padding: 8px 16px; border-radius: 24px; cursor: pointer; font-size: 14px; font-weight: 500; min-height: 44px; transition: all 0.14s; }
        .banda-btn small { display: block; font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .banda-btn.ativo { background: var(--bc); color: white; }
        .banda-btn:active { transform: scale(0.96); }

        /* ── Barra de resultado e Facetas ── */
        .result-header { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; padding-bottom: 12px; margin-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
        .result-count { font-size: 14px; color: #666; flex: 1; min-width: 80px; font-weight: 600;}
        .view-toggle { display: flex; gap: 4px; }
        .view-btn { background: #f0f0f0; color: #777; border: none; width: 36px; height: 36px; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
        .view-btn.ativo { background: var(--primary); color: white; }

        /* Facetas com alvos maiores */
        .facet-sep { width: 1px; height: 24px; background: #ddd; flex-shrink: 0; }
        .facet-inline { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .facet-btn { padding: 6px 14px; font-size: 13px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; transition: all 0.11s; min-height: 34px; }
        .facet-btn.ativo { background: var(--primary); color: white; border-color: var(--primary); }
        .facet-divider { display: inline-block; width: 1px; height: 18px; background: #e0e0e0; margin: 0 4px; vertical-align: middle; }
        .facet-clear-btn { padding: 6px 12px; font-size: 12px; border: 1px solid #f0c0c0; border-radius: 20px; background: white; cursor: pointer; color: #c0392b; min-height: 34px; font-weight: bold; }

        /* ── Cards (Grid) ─────────────── */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .word-card { border: 2px solid #e2e6ea; background: #f8f9fa; padding: 12px 8px 8px; border-radius: 8px; text-align: center; font-size: 17px; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; -webkit-tap-highlight-color: transparent; }
        .word-card:active { transform: scale(0.95); background: #f0f0f0; }
        .word-card.b-rima { border-color: var(--c-rima); } .word-card.b-eco { border-color: var(--c-eco); } .word-card.b-ass { border-color: var(--c-ass); } .word-card.b-prox { border-color: var(--c-prox); } .word-card.b-ritmo { border-color: var(--c-ritmo); }
        .tonica { font-weight: bold; color: var(--accent); }
        .score-num { display: block; font-size: 11px; color: #b0b0b0; margin-top: 4px; font-weight: 500; }

        /* ── Seções Colapsáveis ─ */
        .results-secoes { display: block; }
        .secao { margin-bottom: 20px; }
        .secao-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 6px; cursor: pointer; user-select: none; min-height: 48px; }
        .secao-header:active { filter: brightness(0.9); }
        .secao-toggle { font-size: 12px; flex-shrink: 0; }
        .secao-nome { font-weight: 700; font-size: 16px; }
        .secao-range { font-size: 13px; color: rgba(0,0,0,0.5); }
        .secao-count { margin-left: auto; font-size: 13px; font-weight: 600; opacity: 0.7; }
        .secao-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 12px 0 0; }
        .ver-mais { display: block; width: 100%; margin-top: 10px; padding: 14px; border: 2px dashed #ddd; border-radius: 8px; background: transparent; cursor: pointer; font-size: 14px; color: #777; font-weight: 600; transition: all 0.1s; min-height: 48px;}
        .ver-mais:active { background: #f9f9f9; transform: scale(0.98); }

        /* ── Paginação "Carregar Mais" Mobile-First ───────────────── */
        .paginacao { display: flex; flex-direction: column; align-items: center; margin-top: 24px; padding-bottom: 20px;}
        .btn-carregar-mais { background: var(--primary); color: white; border: none; width: 100%; max-width: 400px; height: 56px; border-radius: 28px; cursor: pointer; font-size: 16px; font-weight: 600; transition: transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-carregar-mais:active { transform: scale(0.96); }
        .pag-info { font-size: 14px; color: #666; font-weight: 500; margin-bottom: 12px; text-align: center; }
        .fim-lista { font-size: 14px; color: #aaa; padding: 20px 0; text-align: center; font-style: italic; }

        @media (min-width: 600px) {
            .container { padding: 0 28px 30px; margin-top: 20px; border-radius: 8px; min-height: auto; }
            .sticky-header { padding-top: 24px; margin-top: 0; border-top-left-radius: 8px; border-top-right-radius: 8px;}
        }

        .empty-msg { color: #888; text-align: center; padding: 40px 0; font-size: 16px; width: 100%; }
    </style>
</head>
<body>
<div class="container">

    <!-- ZONA GRUDENTA (Header + Busca) -->
    <div class="sticky-header">
        <div class="app-header">
            <span class="app-title">Explorador de Sonoridades</span>
            <span class="status-chip" id="statusText">carregando…</span>
        </div>
        <div class="search-wrap">
            <!-- Teclado contextual inteligente: Lupa, sem autocorrect -->
            <input type="search" id="inputPalavra" placeholder="Digite ou fale uma palavra…" 
                   inputmode="search" enterkeyhint="search" autocorrect="off" autocapitalize="none" autocomplete="off">
            <button id="btnMic" class="action-btn" title="Ditado por voz" style="display:none">🎤</button>
            <button id="btnBuscar" class="action-btn" onclick="buscarRimas()" disabled title="Buscar">&#8594;</button>
        </div>
    </div>

    <div class="perfil-linha" id="perfilAlvo" style="display:none"></div>
    <div class="banda-row" id="bandaPanel" style="display:none"></div>

    <div class="result-header" id="resultHeader" style="display:none">
        <span class="result-count" id="resultadosMsg"></span>
        <div class="view-toggle">
            <button class="view-btn ativo" id="btnGrid" onclick="setView('grid')" title="Grade contínua">⊞</button>
            <button class="view-btn" id="btnSec" onclick="setView('secoes')" title="Seções por faixa">≡</button>
        </div>
        <div class="facet-sep" id="facetSep" style="display:none"></div>
        <div class="facet-inline" id="facetPanel"></div>
    </div>

    <div id="resultadosGrid"></div>
    <div class="paginacao" id="paginacao"></div>

</div>
<script>
// ==========================================
// MÓDULO DE RECONHECIMENTO DE VOZ (Web Speech API)
// ==========================================
const btnMic = document.getElementById('btnMic');
const inputPalavra = document.getElementById('inputPalavra');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    btnMic.style.display = 'flex'; // Exibe o botão se houver suporte
    const recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    btnMic.addEventListener('click', () => {
        try {
            recognition.start();
            btnMic.classList.add('listening');
            inputPalavra.placeholder = "Ouvindo...";
        } catch(e) { console.error("Reconhecimento já em andamento."); }
    });

    recognition.addEventListener('result', (e) => {
        // Pega o texto e remove pontuações finais chatas do ditado
        let transcript = e.results[0][0].transcript.replace(/[.,;!?]/g, '').trim();
        // Se a pessoa falar uma frase inteira (ex: "quero rimar amor"), pega só a última palavra
        let words = transcript.split(' ');
        let targetWord = words[words.length - 1];
        
        inputPalavra.value = targetWord;
        buscarRimas();
    });

    recognition.addEventListener('end', () => {
        btnMic.classList.remove('listening');
        inputPalavra.placeholder = "Digite ou fale uma palavra…";
    });

    recognition.addEventListener('error', (e) => {
        console.error("Erro no mic: " + e.error);
        btnMic.classList.remove('listening');
        inputPalavra.placeholder = "Digite ou fale uma palavra…";
    });
}

// ═══════════════════════════════════════════════════════════════
// MOTOR PROSÓDICO — silabificação
// ═══════════════════════════════════════════════════════════════
const vRegex = /[aeiouáàâãéêíóôõúü]/i;

function tratarHiatosVogais(blocoVoc, pLower) {
    if (blocoVoc.length <= 1) return [blocoVoc];
    let resultado = [], atual = blocoVoc[0];
    for (let i = 1; i < blocoVoc.length; i++) {
        let char = blocoVoc[i], par = (atual.slice(-1) + char).toLowerCase();
        let formamDitongo   = /^(ai|au|ei|eu|iu|oi|ou|ui|ão|õe|ãe|ia|ie|io|ua|ue|uo)$/.test(par);
        let vogaisIdenticas = par[0] === par[1];
        let temHiatoAcent   = /[aeiouáéíóúâêôãõü][íú]/.test(par);
        let ehHiatoFinal    = /^(ai|ui|au|oe)$/.test(par) &&
                              (pLower.endsWith(par+"r")||pLower.endsWith(par+"z")||pLower.endsWith(par+"l"));
        let seguidoDeNh     = pLower.includes(par+"nh");
        let formaHiatoDit   = false;
        if (blocoVoc.length >= 3 && /^[aeo]$/.test(atual.slice(-1))) {
            let prox = blocoVoc[i+1] ? blocoVoc[i+1].toLowerCase() : "";
            if (/^(iu|ia|io|ie|ui)$/.test(char+prox)) formaHiatoDit = true;
        }
        if (formamDitongo && !temHiatoAcent && !vogaisIdenticas && !ehHiatoFinal && !seguidoDeNh && !formaHiatoDit)
            atual += char;
        else { resultado.push(atual); atual = char; }
    }
    resultado.push(atual);
    return resultado;
}

function separarConsoantes(cBlock) {
    if (cBlock.length <= 1) return ["", cBlock];
    let tL = cBlock.toLowerCase();
    if (cBlock.length === 2) {
        if (/^(ch|lh|nh|gu|qu|br|cr|dr|fr|gr|pr|tr|vr|bl|cl|fl|gl|pl|tl)$/.test(tL)) return ["", cBlock];
        return[cBlock.slice(0,1), cBlock.slice(1)];
    }
    if (/^(ch|lh|nh|gu|qu|br|cr|dr|fr|gr|pr|tr|vr|bl|cl|fl|gl|pl|tl)$/.test(tL.slice(-2)))
        return [cBlock.slice(0,-2), cBlock.slice(-2)];
    return[cBlock.slice(0,-1), cBlock.slice(-1)];
}

function silabificar(palavra) {
    let blocos =[], tipoAt = '', textoAt = '';
    for (let i = 0; i < palavra.length; i++) {
        let ch = palavra[i], chL = ch.toLowerCase();
        if ((chL==='q'||chL==='g') && palavra[i+1] && palavra[i+1].toLowerCase()==='u'
            && palavra[i+2] && vRegex.test(palavra[i+2])) {
            if (tipoAt==='V') { blocos.push({tipo:'V',texto:textoAt}); textoAt=''; }
            blocos.push({tipo:'C',texto:ch+palavra[i+1]}); i++; tipoAt=''; continue;
        }
        let tipo = vRegex.test(ch) ? 'V' : 'C';
        if (tipo !== tipoAt) { if (textoAt) blocos.push({tipo:tipoAt,texto:textoAt}); tipoAt=tipo; textoAt=ch; }
        else textoAt += ch;
    }
    if (textoAt) blocos.push({tipo:tipoAt,texto:textoAt});
    let bExp =[];
    for (let b of blocos) {
        if (b.tipo==='V') tratarHiatosVogais(b.texto, palavra.toLowerCase()).forEach(v=>bExp.push({tipo:'V',texto:v}));
        else bExp.push(b);
    }
    let idxV = bExp.reduce((a,b,i)=>(b.tipo==='V'?[...a,i]:a),[]);
    if (!idxV.length) return [palavra];
    let sil = new Array(idxV.length).fill("");
    for (let i=0; i<idxV[0]; i++) sil[0] += bExp[i].texto;
    for (let k=0; k<idxV.length-1; k++) {
        sil[k] += bExp[idxV[k]].texto;
        let cT=""; for (let j=idxV[k]+1; j<idxV[k+1]; j++) cT+=bExp[j].texto;
        let [esq,dir] = separarConsoantes(cT); sil[k]+=esq; sil[k+1]+=dir;
    }
    let uV = idxV[idxV.length-1];
    sil[sil.length-1] += bExp[uV].texto;
    for (let i=uV+1; i<bExp.length; i++) sil[sil.length-1]+=bExp[i].texto;
    return sil;
}

function identificarTonica(silabas, p) {
    let t = p.toLowerCase();
    for (let i=0;i<silabas.length;i++) if(/[áéíóúâêô]/i.test(silabas[i])) return i;
    for (let i=0;i<silabas.length;i++) if(/[ãõ]/i.test(silabas[i])) return i;
    if (t.match(/(r|l|z|x|i|is|u|us|im|ins|um|uns)$/)) return silabas.length-1;
    if (t.match(/(a|as|e|es|o|os|am|em|ens)$/))        return Math.max(0,silabas.length-2);
    return Math.max(0,silabas.length-2);
}

function extrairBaseRima(silabas, ti) {
    let pf=silabas.slice(ti).join(''), m=pf.match(vRegex);
    return m ? pf.slice(m.index).toLowerCase() : pf.toLowerCase();
}

function normV(s) {
    return s.toLowerCase().replace(/[áàâ]/g,'a').replace(/[éê]/g,'e').replace(/í/g,'i').replace(/[óô]/g,'o').replace(/[úü]/g,'u');
}
const CLUSTER_FAM = {
    br:'pl',cr:'pl',dr:'pl',fr:'fl',gr:'pl',pr:'pl',tr:'pl',vr:'fl',
    bl:'pl',cl:'pl',fl:'fl',gl:'pl',pl:'pl',tl:'pl', ch:'af',lh:'lp',nh:'np'
};
const FAM_LABEL   = {pl:'plosiva+líquida',fl:'fricativa+líquida',af:'africada',lp:'lateral palatal',np:'nasal palatal',si:'simples',vz:'—',cx:'complexo'};
const ACENT_LABEL = {ox:'Oxítona',px:'Paroxítona',ppx:'Proparoxítona',spx:'Superproparox.'};

function calcOnset(sil) { let m=sil.match(/^([^aeiouáàâãéêíóôõúü]*)/i); return m?m[1].toLowerCase():''; }
function calcVogalT(sil) { let m=sil.match(/[aeiouáàâãéêíóôõúü]/i); return m?normV(m[0]):''; }
function calcVogaisRima(sil,ti) { return normV(sil.slice(ti).join('')).replace(/[^aeiouãõ]/g,''); }
function calcEspinha(p) { return normV(p).replace(/[^aeiouãõ]/g,''); }
function calcAssC(sil,ti) { let span=sil.slice(ti).join('').toLowerCase().replace(/[aeiouáàâãéêíóôõúü]/g,''); return [...new Set(span)].sort().join(''); }
function calcFam(o) { return !o?'vz':o.length===1?'si':(CLUSTER_FAM[o]||'cx'); }
function calcAcent(sil,ti) { let d=sil.length-1-ti; return d===0?'ox':d===1?'px':d===2?'ppx':'spx'; }

function perfilFonetico(palavra) {
    let pL=palavra.toLowerCase().trim();
    if (!pL||!/[a-záàâãéêíóôõúü]/i.test(pL)) return null;
    let sil=silabificar(pL), ti=identificarTonica(sil,pL), onset=calcOnset(sil[ti]);
    return {
        palavra:pL, silabas:sil, tonicaIndex:ti, numSilabas:sil.length, rimaPerfeita:extrairBaseRima(sil,ti),
        onsetTonico:onset, vogalTonica:calcVogalT(sil[ti]), vogaisRima:calcVogaisRima(sil,ti), espinhaVocal:calcEspinha(pL),
        assConsonantal:calcAssC(sil,ti), familiaCluster:calcFam(onset), acentuacao:calcAcent(sil,ti)
    };
}

function calcScore(item, alvo, setOnset, setAssC, lenAssC) {
    let s = 0;
    if (item.rimaPerfeita === alvo.rimaPerfeita)                    s += 100;
    if (alvo.vogaisRima && item.vogaisRima === alvo.vogaisRima)     s +=  60;
    if (alvo.onsetTonico) {
        if (item.onsetTonico === alvo.onsetTonico) s += 50;
        else if (item.onsetTonico) { for (let c of item.onsetTonico) { if (setOnset.has(c)) { s += 25; break; } } }
    }
    if (alvo.familiaCluster !== 'vz' && alvo.familiaCluster !== 'si' && item.familiaCluster === alvo.familiaCluster) s += 20;
    if (lenAssC > 0 && item.assConsonantal) {
        let inter = 0; for (let c of item.assConsonantal) if (setAssC.has(c)) inter++;
        let union = lenAssC + item.assConsonantal.length - inter;
        if (union > 0 && inter / union >= 0.5) s += 30;
    }
    if (alvo.espinhaVocal.length > 1 && item.espinhaVocal === alvo.espinhaVocal) s += 40;
    if (alvo.vogalTonica && item.vogalTonica === alvo.vogalTonica)  s +=  15;
    if (item.numSilabas === alvo.numSilabas && item.acentuacao === alvo.acentuacao) s += 10;
    return s;
}

let dicionarioIndexado =[];

async function indexarDicionario() {
    let chip = document.getElementById("statusText");
    let btn  = document.getElementById("btnBuscar");
    chip.textContent = "baixando…";
    try {
        const resp = await fetch('./palavras.txt');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const lista = (await resp.text()).split(/\r?\n/).map(p=>p.trim()).filter(p=>p.length>1&&/[a-záàâãéêíóôõúü]/i.test(p));
        chip.textContent = `indexando ${lista.length}…`;
        setTimeout(() => {
            dicionarioIndexado = lista.map(p=>perfilFonetico(p)).filter(Boolean);
            chip.innerHTML = `✅ ${dicionarioIndexado.length.toLocaleString('pt-BR')} palavras`;
            btn.disabled = false;
            
            // Foco condicional (Mobile First: não expulsa a interface com teclado se a tela for pequena)
            if (window.innerWidth > 768) {
                inputPalavra.focus();
            }
        }, 50);
    } catch(e) {
        chip.innerHTML = `<span style="color:#c0392b">erro ao carregar palavras.txt</span>`;
    }
}

const BANDAS =[
    { key:160, label:'Rima',        range:'≥ 160',   cls:'b-rima',  color:'#27AE60', bg:'rgba(39,174,96,0.09)'   },
    { key:100, label:'Eco forte',   range:'100–159', cls:'b-eco',   color:'#2980B9', bg:'rgba(41,128,185,0.09)'  },
    { key:60,  label:'Assonância',  range:'60–99',   cls:'b-ass',   color:'#E67E22', bg:'rgba(230,126,34,0.09)'  },
    { key:25,  label:'Proximidade', range:'25–59',   cls:'b-prox',  color:'#8E44AD', bg:'rgba(142,68,173,0.09)'  },
    { key:10,  label:'Ritmo',       range:'10–24',   cls:'b-ritmo', color:'#7F8C8D', bg:'rgba(127,140,141,0.09)' }
];
function getBandaKey(score) { if (score >= 160) return 160; if (score >= 100) return 100; if (score >= 60) return 60; if (score >= 25) return 25; return 10; }

let resultadosCompletos =[], bandasAtivas = new Set([160,100,60,25,10]), facetAtivos = { sil: null, acent: null };
let pagAtual = 0, alvoAtual = null, modoView = 'grid', secaoColapsada = new Set(), secaoLimite = {};

function buscarRimas() {
    let raw = inputPalavra.value.trim();
    if (!raw) return;
    let alvo = perfilFonetico(raw);
    if (!alvo) return;
    alvoAtual = alvo;
    // Ocultar teclado no mobile após a busca
    inputPalavra.blur(); 

    let setOnset = new Set(alvo.onsetTonico), setAssC = new Set(alvo.assConsonantal), lenAssC = alvo.assConsonantal.length;
    resultadosCompletos = dicionarioIndexado.filter(i => i.palavra !== alvo.palavra)
        .map(i => ({ ...i, score: calcScore(i, alvo, setOnset, setAssC, lenAssC) }))
        .filter(i => i.score > 0).sort((a, b) => b.score - a.score);

    bandasAtivas = new Set([160,100,60,25,10]); facetAtivos = { sil: null, acent: null }; pagAtual = 0; secaoColapsada = new Set(); secaoLimite = {};
    mostrarPerfil(alvo); renderBandas(); aplicarFiltros();
}

function aplicarFiltros() {
    let porBanda = resultadosCompletos.filter(i => bandasAtivas.has(getBandaKey(i.score)));
    let final = porBanda.filter(r => {
        if (facetAtivos.sil !== null && r.numSilabas !== facetAtivos.sil) return false;
        if (facetAtivos.acent !== null && r.acentuacao !== facetAtivos.acent) return false;
        return true;
    });

    document.getElementById("resultHeader").style.display = 'flex';
    document.getElementById("resultadosMsg").textContent = `${final.length.toLocaleString('pt-BR')} palavra${final.length !== 1 ? 's' : ''}`;

    if (porBanda.length > 100) {
        renderFacetas(porBanda); document.getElementById("facetSep").style.display = 'block';
    } else {
        document.getElementById("facetPanel").innerHTML = ''; document.getElementById("facetSep").style.display = 'none';
    }
    if (modoView === 'secoes') renderSecoes(final); else renderGrid(final);
}

function renderBandas() {
    let counts = {}; BANDAS.forEach(b => counts[b.key] = 0); resultadosCompletos.forEach(i => counts[getBandaKey(i.score)]++);
    let row = document.getElementById("bandaPanel");
    row.innerHTML = BANDAS.map(b => {
        let ativo = bandasAtivas.has(b.key);
        let s = ativo ? `background:${b.color}; border-color:${b.color}; color:white` : `background:white; border-color:${b.color}; color:${b.color}`;
        return `<button class="banda-btn${ativo?' ativo':''}" style="--bc:${b.color};${s}" onclick="toggleBanda(${b.key})">${b.label}<small>${b.range} · ${counts[b.key]}</small></button>`;
    }).join('');
    row.style.display = 'flex';
}

function toggleBanda(key) {
    if (bandasAtivas.has(key)) bandasAtivas.delete(key); else bandasAtivas.add(key);
    facetAtivos = { sil: null, acent: null }; pagAtual = 0; renderBandas(); aplicarFiltros();
}

function renderFacetas(base) {
    let porSil = {}, porAcent = {};
    base.forEach(r => { porSil[r.numSilabas] = (porSil[r.numSilabas] || 0) + 1; porAcent[r.acentuacao] = (porAcent[r.acentuacao] || 0) + 1; });
    let silBtns = Object.keys(porSil).sort((a,b)=>+a-+b).map(k => `<button class="facet-btn${facetAtivos.sil===+k?' ativo':''}" onclick="setFaceta('sil',${k})">${k}s</button>`).join('');
    let acentBtns = Object.entries(porAcent).map(([k,v]) => `<button class="facet-btn${facetAtivos.acent===k?' ativo':''}" onclick="setFaceta('acent','${k}')">${ACENT_LABEL[k]||k}</button>`).join('');
    let temAtivo = facetAtivos.sil !== null || facetAtivos.acent !== null;
    document.getElementById("facetPanel").innerHTML = silBtns + `<span class="facet-divider"></span>` + acentBtns + (temAtivo ? `<button class="facet-clear-btn" onclick="limparFacetas()">✕</button>` : '');
}

function setFaceta(tipo, valor) { facetAtivos[tipo] = facetAtivos[tipo] === valor ? null : valor; pagAtual = 0; aplicarFiltros(); }
function limparFacetas() { facetAtivos = { sil: null, acent: null }; pagAtual = 0; aplicarFiltros(); }
function setView(modo) { modoView = modo; document.getElementById("btnGrid").classList.toggle("ativo", modo === 'grid'); document.getElementById("btnSec").classList.toggle("ativo", modo === 'secoes'); pagAtual = 0; aplicarFiltros(); }

// ==========================================
// MODO GRADE: PAGINAÇÃO INFINITA (CARREGAR MAIS)
// ==========================================
const POR_PAG = 60;
function renderGrid(resultados) {
    let grid = document.getElementById("resultadosGrid"), pagEl = document.getElementById("paginacao");
    
    // O limite cresce a cada clique no botão Carregar Mais (1x60, 2x60, 3x60...)
    let limite = (pagAtual + 1) * POR_PAG;
    let fatia = resultados.slice(0, limite); // Corta desde o ZERO até o limite

    grid.className = 'results-grid'; 
    grid.innerHTML = '';
    
    if (!resultados.length) { 
        grid.innerHTML = '<p class="empty-msg">Nenhuma palavra encontrada.</p>'; 
        pagEl.innerHTML = ''; 
        return; 
    }

    fatia.forEach(item => {
        let b = BANDAS.find(b => b.key === getBandaKey(item.score)), div = document.createElement("div");
        div.className = `word-card ${b.cls}`; div.dataset.palavra = item.palavra; div.title = `${item.score} pts`;
        div.innerHTML = item.silabas.map((s,i) => i===item.tonicaIndex ? `<span class="tonica">${s}</span>` : s).join('') + `<span class="score-num">${item.score} pts</span>`;
        grid.appendChild(div);
    });

    let total = resultados.length;
    
    // Controle do botão de Carregar Mais
    if (limite >= total) {
        pagEl.innerHTML = `<div class="fim-lista">Fim da lista. Exibindo todos os ${total.toLocaleString('pt-BR')} itens.</div>`;
    } else {
        pagEl.innerHTML = `
            <div class="pag-info">Exibindo ${limite} de ${total.toLocaleString('pt-BR')} itens</div>
            <button class="btn-carregar-mais" onclick="carregarMais()">+ Carregar Mais</button>
        `;
    }
}

function carregarMais() {
    pagAtual++; // Aumenta a quantidade de páginas ativas
    aplicarFiltros(); // Renderiza de novo somando os novos itens
    // Sem scroll forçado! O usuário continua exatamente de onde estava.
}

const SECAO_INICIAL = 24;
function renderSecoes(resultados) {
    let grid = document.getElementById("resultadosGrid"); grid.className = 'results-secoes'; document.getElementById("paginacao").innerHTML = '';
    if (!resultados.length) { grid.innerHTML = '<p class="empty-msg">Nenhuma palavra encontrada.</p>'; return; }
    let groups = {}; BANDAS.forEach(b => groups[b.key] = []); resultados.forEach(r => groups[getBandaKey(r.score)].push(r));
    grid.innerHTML = BANDAS.filter(b => bandasAtivas.has(b.key) && groups[b.key].length > 0).map(b => secaoHTML(b, groups[b.key])).join('');
}

function secaoHTML(banda, words) {
    let collapsed = secaoColapsada.has(banda.key), lim = secaoLimite[banda.key] || SECAO_INICIAL, visible = words.slice(0, lim), temMais = words.length > lim;
    let cardsHTML = visible.map(item => {
        let sil = item.silabas.map((s,i) => i===item.tonicaIndex ? `<span class="tonica">${s}</span>` : s).join('');
        return `<div class="word-card ${banda.cls}" data-palavra="${item.palavra}" title="${item.score} pts">${sil}<span class="score-num">${item.score} pts</span></div>`;
    }).join('');
    return `<div class="secao"><div class="secao-header" onclick="toggleSecao(${banda.key})" style="background:${banda.bg}; border-left:4px solid ${banda.color}"><span class="secao-toggle" style="color:${banda.color}">${collapsed ? '▶' : '▼'}</span><span class="secao-nome" style="color:${banda.color}">${banda.label}</span><span class="secao-range">${banda.range}</span><span class="secao-count">${words.length} itens</span></div>${collapsed ? '' : `<div class="secao-grid">${cardsHTML}</div>${temMais ? `<button class="ver-mais" onclick="verMaisSecao(${banda.key})">+ Carregar mais ${Math.min(24, words.length - lim)}</button>` : ''}`}</div>`;
}

function _getSecoesFinal() {
    return resultadosCompletos.filter(i => bandasAtivas.has(getBandaKey(i.score))).filter(r => {
        if (facetAtivos.sil !== null && r.numSilabas !== facetAtivos.sil) return false;
        if (facetAtivos.acent !== null && r.acentuacao !== facetAtivos.acent) return false; return true;
    });
}
function toggleSecao(key) { if (secaoColapsada.has(key)) secaoColapsada.delete(key); else secaoColapsada.add(key); renderSecoes(_getSecoesFinal()); }
function verMaisSecao(key) { secaoLimite[key] = (secaoLimite[key] || SECAO_INICIAL) + 24; renderSecoes(_getSecoesFinal()); }

function mostrarPerfil(alvo) {
    let silHTML = alvo.silabas.map((s,i) => i===alvo.tonicaIndex ? `<b class="tonica-inline">${s.toUpperCase()}</b>` : s).join('·');
    let famTag = (alvo.familiaCluster !== 'si' && alvo.familiaCluster !== 'vz') ? `<span class="ptag">cluster: ${FAM_LABEL[alvo.familiaCluster]||alvo.familiaCluster}</span>` : '';
    let box = document.getElementById("perfilAlvo");
    box.innerHTML = `<span class="perfil-pw">${silHTML}</span><span class="ptag">${alvo.numSilabas} síl.</span><span class="ptag">${ACENT_LABEL[alvo.acentuacao]||alvo.acentuacao}</span><span class="ptag">vogal /${alvo.vogalTonica}/</span>${alvo.onsetTonico ? `<span class="ptag">onset: ${alvo.onsetTonico}</span>` : ''}${famTag}${alvo.vogaisRima ? `<span class="ptag">rim.vog: ${alvo.vogaisRima}</span>` : ''}${alvo.espinhaVocal ? `<span class="ptag">espinha: ${alvo.espinhaVocal}</span>` : ''}${alvo.assConsonantal? `<span class="ptag">cons: ${alvo.assConsonantal}</span>` : ''}`;
    box.style.display = 'flex';
}

document.getElementById("resultadosGrid").addEventListener("click", e => {
    let card = e.target.closest(".word-card");
    if (card && card.dataset.palavra) {
        inputPalavra.value = card.dataset.palavra;
        buscarRimas();
        window.scrollTo({top: 0, behavior: 'smooth'}); // Volta pro topo confortavelmente ao buscar nova palavra
    }
});

inputPalavra.addEventListener("keypress", e => { if (e.key === "Enter" && !document.getElementById("btnBuscar").disabled) buscarRimas(); });

window.onload = indexarDicionario;
</script>
</body>
